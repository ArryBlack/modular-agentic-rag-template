services:
  agent:
    build: .
    container_name: adk-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - chroma
      - mongo
    environment:
      - ALLOWED_ORIGINS=*
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - MONGO_URI=mongodb://mongo:27017
    volumes:
      - ./agents:/app/agents
      - ./services:/app/services
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    expose:
      - "8000"
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    restart: unless-stopped

  # Tunnel being used by me (Aryarishi), as the dev environment is running on Codespaces.
  #quick_tunnel:
   #image: cloudflare/cloudflared:latest
   #container_name: adk_quick_tunnel
   #command: tunnel --url http://agent:8000
   #depends_on:
   #  - agent

volumes:
  chroma_data:
  mongo_data: